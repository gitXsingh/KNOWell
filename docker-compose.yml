services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_ADDR: ${APP_ADDR:-":8080"}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_TOKEN_SECRET: ${GITHUB_TOKEN_SECRET}
      GITHUB_REDIRECT_URL: ${GITHUB_REDIRECT_URL}
      GITHUB_FRONTEND_CALLBACK_URL: ${GITHUB_FRONTEND_CALLBACK_URL}
      GITHUB_WEBHOOK_URL: ${GITHUB_WEBHOOK_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: ${VITE_API_BASE}
    ports:
      - "3000:3000"
    depends_on:
      - backend
